<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Editor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>📷 Photo Editor</h1>
    <p>Carica una foto e modificala facilmente</p>
  </header>

  <main>

    <!-- Upload area -->
    <div id="upload-area" class="upload-area">
      <div class="upload-icon">⬆</div>
      <p>Trascina qui la tua foto</p>
      <p class="or">oppure</p>
      <label for="file-input" class="btn btn-primary">Scegli file</label>
      <input type="file" id="file-input" accept="image/*" />
    </div>

    <!-- Editor -->
    <div id="editor" class="editor hidden">

      <div class="canvas-wrapper">
        <canvas id="canvas"></canvas>
      </div>

      <div class="controls">

        <section class="control-group">
          <h2>Regolazioni</h2>

          <div class="slider-row">
            <label for="brightness">Luminosità</label>
            <input type="range" id="brightness" min="-100" max="100" value="0" />
            <span class="val" id="brightness-val">0</span>
          </div>

          <div class="slider-row">
            <label for="contrast">Contrasto</label>
            <input type="range" id="contrast" min="-100" max="100" value="0" />
            <span class="val" id="contrast-val">0</span>
          </div>

          <div class="slider-row">
            <label for="saturation">Saturazione</label>
            <input type="range" id="saturation" min="-100" max="100" value="0" />
            <span class="val" id="saturation-val">0</span>
          </div>

          <div class="slider-row">
            <label for="blur">Sfocatura</label>
            <input type="range" id="blur" min="0" max="20" value="0" />
            <span class="val" id="blur-val">0</span>
          </div>
        </section>

        <section class="control-group">
          <h2>Filtri</h2>
          <div class="filter-grid">
            <button class="filter-btn active" data-filter="none">Originale</button>
            <button class="filter-btn" data-filter="grayscale">Grigio</button>
            <button class="filter-btn" data-filter="sepia">Seppia</button>
            <button class="filter-btn" data-filter="invert">Inverti</button>
            <button class="filter-btn" data-filter="vintage">Vintage</button>
            <button class="filter-btn" data-filter="cold">Freddo</button>
            <button class="filter-btn" data-filter="warm">Caldo</button>
          </div>
        </section>

        <section class="control-group">
          <h2>Trasformazioni</h2>
          <div class="transform-btns">
            <button class="btn btn-secondary" id="rotate-left">↺ Ruota sx</button>
            <button class="btn btn-secondary" id="rotate-right">↻ Ruota dx</button>
            <button class="btn btn-secondary" id="flip-h">⟷ Specchio H</button>
            <button class="btn btn-secondary" id="flip-v">↕ Specchio V</button>
          </div>
        </section>

        <section class="control-group actions">
          <button class="btn btn-danger" id="reset-btn">↩ Reimposta</button>
          <button class="btn btn-success" id="download-btn">⬇ Scarica foto</button>
          <button class="btn btn-secondary" id="new-photo-btn">Nuova foto</button>
        </section>

      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
